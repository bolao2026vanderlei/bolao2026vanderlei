<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Bolao Copa 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --verde:#00A36C;--verde-dark:#007A50;--verde-light:#E8F8F2;
  --amarelo:#F59E0B;--amarelo-light:#FEF3C7;
  --azul:#1E40AF;--azul-light:#EFF6FF;
  --vermelho:#DC2626;--vermelho-light:#FEE2E2;
  --laranja:#EA580C;--laranja-light:#FFF7ED;
  --cinza:#F8F9FA;--cinza2:#F1F3F5;--cinza3:#E9ECEF;
  --borda:#DEE2E6;--texto:#1A1A2E;--texto2:#6B7280;--texto3:#9CA3AF;
  --branco:#FFFFFF;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.06);
  --shadow-md:0 4px 6px rgba(0,0,0,.07),0 2px 4px rgba(0,0,0,.06);
  --shadow-lg:0 10px 15px rgba(0,0,0,.08),0 4px 6px rgba(0,0,0,.05);
  --radius:12px;--radius-sm:8px;--radius-lg:16px;--radius-xl:20px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Barlow',sans-serif;background:var(--cinza);color:var(--texto);
  min-height:100vh;-webkit-font-smoothing:antialiased}

/* LOADING */
#loading{position:fixed;inset:0;z-index:300;background:rgba(255,255,255,.95);
  display:none;align-items:center;justify-content:center;flex-direction:column;gap:16px}
#loading p{font-size:14px;color:var(--texto2);font-weight:500}
.bspin{width:40px;height:40px;border:3px solid var(--cinza3);
  border-top-color:var(--verde);border-radius:50%;animation:spin .8s linear infinite}
.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(0,0,0,.15);
  border-top-color:var(--verde);border-radius:50%;animation:spin .7s linear infinite;
  vertical-align:middle;margin-right:6px}

/* MODAL */
.modal-overlay{position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.5);
  display:none;align-items:flex-end;justify-content:center;padding:0}
.modal-overlay.show{display:flex}
.modal{background:var(--branco);border-radius:var(--radius-xl) var(--radius-xl) 0 0;
  width:100%;max-width:600px;max-height:85vh;overflow-y:auto;
  animation:slideUp .3s ease both}
.modal-handle{width:40px;height:4px;background:var(--cinza3);border-radius:2px;
  margin:12px auto 0}
.modal-header{padding:16px 20px 12px;border-bottom:1px solid var(--borda);
  display:flex;align-items:center;justify-content:space-between}
.modal-title{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;color:var(--texto)}
.modal-close{width:32px;height:32px;border-radius:50%;border:none;
  background:var(--cinza2);color:var(--texto2);font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center}
.modal-body{padding:16px 20px 32px}
.modal-jogo-info{background:var(--cinza2);border-radius:var(--radius-sm);
  padding:12px 16px;margin-bottom:16px;text-align:center}
.modal-placar{font-family:'Barlow Condensed',sans-serif;font-size:32px;
  font-weight:900;color:var(--texto)}
.modal-sub{font-size:12px;color:var(--texto3);margin-top:2px}
.palpite-row{display:flex;align-items:center;gap:12px;padding:10px 0;
  border-bottom:1px solid var(--cinza3)}
.palpite-row:last-child{border-bottom:none}
.pr-avatar{width:34px;height:34px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,var(--verde),var(--azul));
  display:flex;align-items:center;justify-content:center;
  font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;color:#fff}
.pr-nome{flex:1;font-size:14px;font-weight:600;color:var(--texto)}
.pr-palpite{font-family:'Barlow Condensed',sans-serif;font-size:20px;
  font-weight:900;color:var(--texto);min-width:60px;text-align:center}
.pr-pts{font-size:11px;font-weight:700;padding:3px 8px;
  border-radius:20px;white-space:nowrap}
.pr-pts.exato{background:var(--verde-light);color:var(--verde-dark)}
.pr-pts.result{background:var(--azul-light);color:var(--azul)}
.pr-pts.errou{background:var(--vermelho-light);color:var(--vermelho)}
.pr-pts.pend{background:var(--cinza2);color:var(--texto3)}
.sem-palpite{font-size:12px;color:var(--texto3);font-style:italic}

/* LOGIN */
#tela-login{position:fixed;inset:0;z-index:200;background:var(--branco);
  display:flex;align-items:center;justify-content:center;padding:20px}
.login-wrap{width:100%;max-width:400px}
.login-header{text-align:center;margin-bottom:20px}
.login-icon{width:68px;height:68px;background:linear-gradient(135deg,#00A36C,#005C3E);
  border-radius:18px;display:flex;align-items:center;justify-content:center;
  font-size:34px;margin:0 auto 14px;box-shadow:var(--shadow-md)}
.login-title{font-family:'Barlow Condensed',sans-serif;font-size:30px;
  font-weight:900;color:var(--texto);letter-spacing:-.5px}
.login-sub{font-size:12px;color:var(--texto3);margin-top:4px;
  letter-spacing:.5px;text-transform:uppercase}
.login-card{background:var(--branco);border-radius:var(--radius-xl);
  box-shadow:var(--shadow-lg);padding:26px 22px;border:1px solid var(--borda)}
.login-tabs{display:flex;background:var(--cinza2);border-radius:var(--radius-sm);
  padding:4px;margin-bottom:20px;gap:4px}
.ltab{flex:1;padding:9px;border:none;border-radius:6px;font-family:'Barlow',sans-serif;
  font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;
  background:transparent;color:var(--texto2)}
.ltab.on{background:var(--branco);color:var(--verde);box-shadow:var(--shadow)}
.lform{display:none}
.lform.show{display:block}
.field{margin-bottom:13px}
.field label{display:block;font-size:11px;font-weight:700;color:var(--texto2);
  margin-bottom:5px;letter-spacing:.3px;text-transform:uppercase}
.field input{width:100%;padding:12px 14px;background:var(--cinza);
  border:1.5px solid var(--borda);border-radius:var(--radius-sm);color:var(--texto);
  font-family:'Barlow',sans-serif;font-size:15px;outline:none;transition:all .2s}
.field input:focus{border-color:var(--verde);background:var(--branco);
  box-shadow:0 0 0 3px rgba(0,163,108,.1)}
.btn-primary{width:100%;padding:13px;background:var(--verde);border:none;
  border-radius:var(--radius-sm);color:#fff;font-family:'Barlow',sans-serif;
  font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;
  box-shadow:0 2px 8px rgba(0,163,108,.3)}
.btn-primary:hover{background:var(--verde-dark)}
.btn-primary:disabled{opacity:.6;cursor:not-allowed}
.lerro{color:var(--vermelho);font-size:12px;margin-top:8px;min-height:16px;
  font-weight:500;text-align:center}
.login-hint{text-align:center;margin-top:14px;font-size:11px;color:var(--texto3);line-height:1.7}

/* APP */
#app{display:none;padding-bottom:80px}
.header{background:var(--branco);border-bottom:1px solid var(--borda);
  position:sticky;top:0;z-index:100;box-shadow:var(--shadow)}
.header-inner{max-width:600px;margin:0 auto;padding:0 16px;
  display:flex;align-items:center;justify-content:space-between;height:54px}
.logo{font-family:'Barlow Condensed',sans-serif;font-size:21px;
  font-weight:900;color:var(--texto)}
.logo span{color:var(--verde)}
.hright{display:flex;align-items:center;gap:8px}
.avatar{width:32px;height:32px;border-radius:50%;
  background:linear-gradient(135deg,var(--verde),var(--azul));
  display:flex;align-items:center;justify-content:center;
  font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;color:#fff}
.uname{font-size:13px;font-weight:600;color:var(--texto)}
.btn-sair{padding:5px 10px;border-radius:20px;border:1.5px solid var(--borda);
  background:transparent;color:var(--texto2);font-size:11px;font-weight:600;cursor:pointer}
.btn-sair:hover{border-color:var(--vermelho);color:var(--vermelho)}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:100;
  background:var(--branco);border-top:1px solid var(--borda);
  display:flex;box-shadow:0 -4px 12px rgba(0,0,0,.06)}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:8px 4px;border:none;background:transparent;
  cursor:pointer;color:var(--texto3);gap:3px;font-family:'Barlow',sans-serif}
.bnav-btn.on{color:var(--verde)}
.bnav-icon{font-size:22px;line-height:1}
.bnav-label{font-size:10px;font-weight:600;letter-spacing:.3px;text-transform:uppercase}

/* MAIN */
.main{max-width:600px;margin:0 auto;padding:16px}
.secao{display:none}
.secao.on{display:block;animation:fadeUp .3s ease both}

/* HERO */
.hero-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.hero-card{background:var(--branco);border-radius:var(--radius);
  padding:14px 16px;box-shadow:var(--shadow);border:1px solid var(--borda)}
.hero-card.destaque{background:linear-gradient(135deg,var(--verde),var(--verde-dark));border-color:transparent}
.hero-label{font-size:10px;font-weight:700;letter-spacing:1px;
  text-transform:uppercase;color:var(--texto3);margin-bottom:5px}
.hero-card.destaque .hero-label{color:rgba(255,255,255,.7)}
.hero-valor{font-family:'Barlow Condensed',sans-serif;font-size:32px;
  font-weight:900;color:var(--texto);line-height:1}
.hero-card.destaque .hero-valor{color:#fff}
.hero-detalhe{font-size:11px;color:var(--texto3);margin-top:2px}
.hero-card.destaque .hero-detalhe{color:rgba(255,255,255,.7)}
.sec-title{font-family:'Barlow Condensed',sans-serif;font-size:17px;
  font-weight:700;color:var(--texto);margin-bottom:10px;
  display:flex;align-items:center;justify-content:space-between}

/* JOGO CARD */
.jcard{background:var(--branco);border-radius:var(--radius);
  padding:12px 14px;margin-bottom:8px;box-shadow:var(--shadow);
  border:1.5px solid var(--borda);transition:all .2s}
.jcard.brasil{border-color:var(--amarelo);background:var(--amarelo-light)}
.jcard.enc{background:var(--cinza)}
.jcard.bloqueado{border-color:#FED7AA;background:#FFFBF5}
.jcard.anulado{border-color:#FCA5A5;background:#FEF2F2}
.jcard.clicavel{cursor:pointer}
.jcard.clicavel:active{transform:scale(.99)}
.jcard-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.jcard-fase{font-size:10px;font-weight:700;padding:3px 8px;
  border-radius:20px;letter-spacing:.3px;text-transform:uppercase}
.fase-grupos{background:var(--azul-light);color:var(--azul)}
.fase-32{background:#F0FDF4;color:#166534}
.fase-oitavas{background:#FAF5FF;color:#7E22CE}
.fase-quartas{background:#FFF7ED;color:#C2410C}
.fase-semi{background:#FEF2F2;color:#991B1B}
.fase-terceiro{background:var(--azul-light);color:var(--azul)}
.fase-final{background:#1A1A2E;color:#fff}
.jcard-meta{font-size:11px;color:var(--texto3);font-weight:500}
.jcard-body{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px}
.tname{font-family:'Barlow Condensed',sans-serif;font-size:16px;
  font-weight:700;color:var(--texto);white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis}
.tright{text-align:right}
.placar-area{display:flex;align-items:center;gap:5px;justify-content:center}
.pinput{width:42px;height:42px;background:var(--cinza2);
  border:2px solid var(--borda);border-radius:var(--radius-sm);
  color:var(--texto);text-align:center;font-family:'Barlow Condensed',sans-serif;
  font-size:19px;font-weight:700;outline:none;transition:all .2s}
.pinput:focus{border-color:var(--verde);background:var(--verde-light)}
.pinput.ok{border-color:var(--verde);background:var(--verde-light);color:var(--verde-dark)}
.pinput.locked{background:var(--cinza2);border-color:var(--cinza3);
  color:var(--texto3);pointer-events:none;opacity:.7}
.psep{color:var(--texto3);font-size:15px;font-weight:700}
.res-oficial{font-family:'Barlow Condensed',sans-serif;font-size:26px;
  font-weight:900;color:var(--texto);text-align:center;min-width:66px}
.ptag{font-size:10px;font-weight:700;padding:3px 8px;
  border-radius:20px;display:inline-block;margin-top:3px;letter-spacing:.3px}
.ptag.exato{background:var(--verde-light);color:var(--verde-dark)}
.ptag.result{background:var(--azul-light);color:var(--azul)}
.ptag.errou{background:var(--vermelho-light);color:var(--vermelho)}
.pts-hint{font-size:10px;color:var(--texto3);text-align:center;margin-top:3px}

/* STATUS BLOQUEIO */
.lock-status{display:flex;align-items:center;gap:5px;justify-content:center;
  margin-top:6px}
.lock-badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px}
.lock-badge.aberto{background:#DCFCE7;color:#166534}
.lock-badge.fechando{background:#FEF3C7;color:#92400E}
.lock-badge.bloqueado{background:#FEE2E2;color:#991B1B}
.lock-badge.encerrado{background:var(--cinza2);color:var(--texto3)}

.ver-palpites-btn{width:100%;margin-top:10px;padding:8px;
  background:var(--cinza2);border:1px solid var(--borda);border-radius:var(--radius-sm);
  font-size:12px;font-weight:700;color:var(--texto2);cursor:pointer;
  transition:all .2s;display:flex;align-items:center;justify-content:center;gap:6px}
.ver-palpites-btn:hover{background:var(--azul-light);border-color:var(--azul);color:var(--azul)}

/* FILTROS */
.filtros{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;
  margin-bottom:14px;scrollbar-width:none}
.filtros::-webkit-scrollbar{display:none}
.fbtn{padding:7px 14px;border-radius:20px;border:1.5px solid var(--borda);
  background:var(--branco);color:var(--texto2);font-size:12px;font-weight:600;
  cursor:pointer;transition:all .2s;white-space:nowrap;box-shadow:var(--shadow)}
.fbtn.on{background:var(--verde);border-color:var(--verde);color:#fff}

/* RANKING */
.rank-item{background:var(--branco);border-radius:var(--radius);
  padding:13px 15px;margin-bottom:8px;box-shadow:var(--shadow);
  border:1.5px solid var(--borda);display:flex;align-items:center;gap:10px}
.rank-item.me{border-color:var(--verde);background:var(--verde-light)}
.rank-pos{width:30px;height:30px;border-radius:9px;display:flex;
  align-items:center;justify-content:center;flex-shrink:0;
  font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:900}
.rp1{background:#FEF3C7;color:#D97706;font-size:18px;font-weight:900}
.rp2{background:#F1F5F9;color:#64748B;font-size:18px;font-weight:900}
.rp3{background:#FFF7ED;color:#C2410C;font-size:18px;font-weight:900}
.rp4{background:#F0FDF4;color:#166534;font-size:18px;font-weight:900}
.rp5{background:#EFF6FF;color:#1E40AF;font-size:18px;font-weight:900}
.rpn{background:var(--cinza2);color:var(--texto3);font-size:15px;font-weight:700}
.rank-avatar{width:34px;height:34px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,var(--verde),var(--azul));
  display:flex;align-items:center;justify-content:center;
  font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;color:#fff}
.rank-info{flex:1;min-width:0}
.rank-nome{font-size:13px;font-weight:700;color:var(--texto);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rank-sub{font-size:10px;color:var(--texto3);margin-top:2px}
.rank-pts{font-family:'Barlow Condensed',sans-serif;font-size:24px;
  font-weight:900;color:var(--verde);flex-shrink:0}
.rank-pts-label{font-size:9px;color:var(--texto3);text-align:center}
.mbar{height:3px;background:var(--cinza3);border-radius:2px;overflow:hidden;width:70px;margin-top:3px}
.mbar-fill{height:100%;background:var(--verde);border-radius:2px}

/* ADMIN */
.acard{background:var(--branco);border-radius:var(--radius);
  padding:15px;margin-bottom:12px;box-shadow:var(--shadow);border:1px solid var(--borda)}
.acard h3{font-size:12px;font-weight:700;color:var(--texto2);
  text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px;
  padding-bottom:9px;border-bottom:1px solid var(--cinza3)}
.ajogo{display:flex;align-items:center;gap:7px;
  padding:9px 0;border-bottom:1px solid var(--cinza3)}
.ajogo:last-child{border-bottom:none}
.ajogo-nome{flex:1;min-width:0}
.ajogo-nome b{font-size:12px;color:var(--texto);font-weight:700;
  display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ajogo-nome span{font-size:10px;color:var(--texto3)}
.ainput{width:40px;height:34px;background:var(--cinza2);
  border:1.5px solid var(--borda);border-radius:6px;color:var(--texto);
  text-align:center;font-family:'Barlow Condensed',sans-serif;
  font-size:17px;font-weight:700;outline:none}
.ainput:focus{border-color:var(--amarelo)}
.btn-sv{padding:6px 11px;border-radius:6px;background:var(--verde);border:none;
  color:#fff;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap}
.btn-sv.salvo{background:var(--cinza3);color:var(--texto2)}
.btn-del{padding:6px 9px;border-radius:6px;background:var(--vermelho-light);
  border:1.5px solid #FECACA;color:var(--vermelho);font-size:11px;
  font-weight:700;cursor:pointer;white-space:nowrap}
.btn-del:hover{background:var(--vermelho);color:#fff}
.res-salvo{font-family:'Barlow Condensed',sans-serif;font-size:20px;
  font-weight:900;color:var(--verde);flex-shrink:0}
.chip{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;
  border-radius:20px;font-size:11px;font-weight:600}
.chip-verde{background:var(--verde-light);color:var(--verde-dark)}

/* UTILS */
.btn-verde-sm{padding:7px 14px;border-radius:20px;background:var(--verde);
  border:none;color:#fff;font-size:12px;font-weight:700;cursor:pointer}
.btn-outline{padding:7px 14px;border-radius:20px;border:1.5px solid var(--borda);
  background:var(--branco);color:var(--texto2);font-size:12px;font-weight:600;cursor:pointer}
.empty{text-align:center;padding:40px 20px}
.empty-icon{font-size:44px;margin-bottom:10px}
.empty-text{font-size:13px;color:var(--texto3);font-weight:500}

/* TOAST */
#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(10px);
  z-index:999;background:var(--texto);color:#fff;padding:11px 18px;
  border-radius:24px;font-size:13px;font-weight:600;opacity:0;
  transition:all .3s;pointer-events:none;white-space:nowrap;box-shadow:var(--shadow-lg)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.ok{background:var(--verde)}
#toast.err{background:var(--vermelho)}

@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--cinza3);border-radius:2px}
@media(max-width:640px){.uname{display:none}}
</style>
</head>
<body>

<div id="loading"><div class="bspin"></div><p id="lmsg">Carregando...</p></div>

<!-- MODAL PALPITES DO JOGO -->
<div class="modal-overlay" id="modal-overlay" onclick="fecharModal(event)">
  <div class="modal" id="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-title" id="modal-title">Palpites do Jogo</div>
      <button class="modal-close" onclick="fecharModalBtn()">&#x2715;</button>
    </div>
    <div class="modal-body">
      <div class="modal-jogo-info" id="modal-jogo-info"></div>
      <div id="modal-lista"></div>
    </div>
  </div>
</div>

<!-- LOGIN -->
<div id="tela-login">
  <div class="login-wrap">

async function adminOp(action, jogoId, golCasa, golFora){
  try{
    var session = (await SB.auth.getSession()).data.session;
    if(!session) return {error:{message:'Sem sessao admin'}};
    var res = await fetch('/api/admin', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + session.access_token
      },
      body: JSON.stringify({
        action: action,
        jogo_id: jogoId,
        gol_casa: golCasa,
        gol_fora: golFora
      })
    });
    var data = await res.json();
    if(!res.ok) return {error:{message:data.error||'Erro no servidor'}};
    return {error:null};
  }catch(e){
    return {error:{message:e.message}};
  }
}

// ── TEMPO ───────────────────────────────────────────────────────────────────
// Converte string "YYYY-MM-DDTHH:MM" BRT para timestamp UTC
function brtToUtc(str) {
  // Converte horario BRT (UTC-3) para UTC sem depender do fuso do dispositivo
  var p = str.split('T'), d = p[0].split('-'), t = p[1].split(':');
  var baseUtc = Date.UTC(+d[0], +d[1]-1, +d[2], 0, 0, 0);
  var horas   = +t[0] * 60 * 60 * 1000;
  var minutos = +t[1] * 60 * 1000;
  var offset  = 3 * 60 * 60 * 1000; // BRT = UTC-3
  return baseUtc + horas + minutos + offset;
}

function statusJogo(jogoDateStr, jogoId) {
  if (jogoId && JOGOS_REABERTOS[jogoId]) return 'aberto';
  // Usa horário customizado se admin alterou
  var dtEfetivo = (jogoId && JOGOS_HORARIO[jogoId]) ? JOGOS_HORARIO[jogoId] : jogoDateStr;
  var agora = Date.now();
  var kickoff = brtToUtc(dtEfetivo);
  var bloqueio = kickoff - BLOQUEIO_MIN * 60 * 1000;
  var diff = bloqueio - agora;
  if (agora >= kickoff) return 'encerrado';
  if (diff <= 0)        return 'bloqueado';
  if (diff <= 30*60*1000) return 'fechando';
  return 'aberto';
}

function tempoRestante(jogoDateStr) {
  var agora = Date.now();
  var kickoff = brtToUtc(jogoDateStr);
  var bloqueio = kickoff - BLOQUEIO_MIN * 60 * 1000;
  var diff = bloqueio - agora;
  if (diff <= 0) return null;
  var h = Math.floor(diff/3600000);
  var m = Math.floor((diff%3600000)/60000);
  if (h > 0) return h+'h '+m+'min';
  return m+'min';
}

function fmtData(str) {
  var p = str.split('T'), d = p[0].split('-');
  return d[2]+'/'+d[1]+' '+p[1];
}

async function dbAll(t){
  var all=[], from=0, size=1000;
  while(true){
    var res=await SB.from(t).select('*').range(from,from+size-1);
    if(!res.data||res.data.length===0) break;
    all=all.concat(res.data);
    if(res.data.length<size) break;
    from+=size;
  }
  return all;
}

// ── PONTUACAO ─────────────────────────────────────────────────────────────────
function calcPts(fase,pc,pf,rc,rf,jogoId){
  if(jogoId && JOGOS_ANULADOS[jogoId]) return 0; // jogo anulado
  if(pc==null||pf==null||rc==null||rf==null)return 0;
  var par=PTS[fase];if(!par)return 0;
  pc=+pc;pf=+pf;rc=+rc;rf=+rf;
  if(pc===rc&&pf===rf)return par[1];
  var rp=pc>pf?1:pc<pf?-1:0,rr=rc>rf?1:rc<rf?-1:0;
  return rp===rr?par[0]:0;
}
// Calcula posicao do usuario no ranking usando dados ja carregados
var RANK_CACHE = {pos:0, total:0, ts:0};
// Função única de cálculo de ranking — usada tanto pelo cache quanto pela aba Ranking
async function calcularRankCompleto(){
  var rRes=await dbAll('resultados');
  var rPals=await dbAll('palpites');
  var rUsr=await SB.from('usuarios').select('nome').neq('nome','admin');

  // Atualiza caches globais
  RESULS={};rRes.forEach(function(r){RESULS[parseInt(r.jogo_id)]={c:parseInt(r.gol_casa),f:parseInt(r.gol_fora)};});

  var palMap={};
  // Ordena por id para garantir que o mais recente (maior id) prevaleça
  rPals.sort(function(a,b){return a.id-b.id;});
  rPals.forEach(function(p){
    if(!palMap[p.usuario])palMap[p.usuario]={};
    var gc=parseInt(p.gol_casa), gf=parseInt(p.gol_fora);
    // Só atualiza se tiver valores explicitamente não-nulos e não-NaN
    if(p.gol_casa!=null && p.gol_fora!=null && !isNaN(gc) && !isNaN(gf)){
      palMap[p.usuario][parseInt(p.jogo_id)]={c:gc,f:gf};
    }
  });
  // Atualiza palpites do usuário atual no cache local
  if(USER && palMap[USER.nome]){
    PALPS={};
    Object.keys(palMap[USER.nome]).forEach(function(jid){
      PALPS[parseInt(jid)]=palMap[USER.nome][jid];
    });
  }

  var usuarios=rUsr.data||[];
  var rank=usuarios.map(function(u){
    var pals=palMap[u.nome]||{};
    var total=0,exatos=0,acertos=0,np=Object.keys(pals).length;
    JOGOS.forEach(function(j){
      var p=pals[j[0]],r=RESULS[j[0]];if(!p||!r)return;
      var pts=calcPts(j[2],p.c,p.f,r.c,r.f,j[0]);
      if(pts>0){total+=pts;acertos++;if(pts===PTS[j[2]][1])exatos++;}
    });
    return{nome:u.nome,total:total,exatos:exatos,acertos:acertos,np:np};
  });

  // Ordenação idêntica à aba Ranking
  rank.sort(function(a,b){
    return b.total-a.total||b.exatos-a.exatos||b.acertos-a.acertos||a.nome.localeCompare(b.nome,'pt');
  });

  // Calcula posições com empate correto
  var posicoes=[];
  var posAtual=1;
  for(var ri=0;ri<rank.length;ri++){
    if(ri>0 &&
      rank[ri].total===rank[ri-1].total &&
      rank[ri].exatos===rank[ri-1].exatos &&
      rank[ri].acertos===rank[ri-1].acertos){
      posicoes.push(posicoes[ri-1]);
    } else {
      posAtual=ri+1;
      posicoes.push(posAtual);
    }
  }

  // Atualiza cache de posição
  var minhaPos=0;
  for(var i=0;i<rank.length;i++){
    if(rank[i].nome===USER.nome){minhaPos=posicoes[i];break;}
  }
  RANK_CACHE={pos:minhaPos,total:usuarios.length,ts:Date.now()};

  return{rank:rank,posicoes:posicoes,usuarios:usuarios};
}

async function atualizarRankCache(){
  await calcularRankCompleto();
}
function calcPosicaoCache(){return RANK_CACHE;}

function calcCache(){
  var t=0,a=0,e=0;
  JOGOS.forEach(function(j){
    var p=PALPS[j[0]],r=RESULS[j[0]];if(!p||!r)return;
    var pts=calcPts(j[2],p.c,p.f,r.c,r.f,j[0]);
    if(pts>0){t+=pts;a++;if(pts===PTS[j[2]][1])e++;}
  });
  return{total:t,acertos:a,exatos:e};
}

// ── CARD DE JOGO ──────────────────────────────────────────────────────────────
function jcard(j, editavel){
  var id=j[0],dtStr=(JOGOS_HORARIO[j[0]]||j[1]),fase=j[2],grupo=j[3],sede=j[4];
  var casa = getNomeExibicao(id,'casa',j[5]);
  var fora = getNomeExibicao(id,'fora',j[6]);
  var p=PALPS[id]||{};
  var r=RESULS[id];
  var enc=!!r;
  var st=statusJogo(dtStr);
  var locked=(st==='bloqueado'||st==='encerrado');
  var par=PTS[fase]||[0,0];
  var pr=par[0],pe=par[1];
  var isBrasil=!!BRASIL[id];
  var dataFmt=fmtData(dtStr);

  // Fase abrev
  var fab=({'Fase de Grupos':'Gr.'+grupo,'16-avos de Final':'16-avos',
    'Oitavas de Final':'Oitavas','Quartas de Final':'Quartas',
    'Semifinais':'Semi','3 Lugar':'3 Lugar','Final':'FINAL'})[fase]||fase;

  // Pts tag
  var ptsHtml='';
  if(enc&&p.c!=null){
    var pts=calcPts(fase,p.c,p.f,r.c,r.f,id);
    if(pts===pe)ptsHtml='<span class="ptag exato">+'+pts+' Exato!</span>';
    else if(pts===pr)ptsHtml='<span class="ptag result">+'+pts+' Resultado</span>';
    else ptsHtml='<span class="ptag errou">0 pts</span>';
  }

  // Badge de status tempo
  var lockHtml='';
  if(!enc){
    var tr=tempoRestante(dtStr);
    if(st==='aberto'&&tr)
      lockHtml='<span class="lock-badge aberto">&#x1F513; Aberto - fecha em '+tr+'</span>';
    else if(st==='fechando'&&tr)
      lockHtml='<span class="lock-badge fechando">&#x26A0;&#xFE0F; Fechando em '+tr+'</span>';
    else if(st==='bloqueado')
      lockHtml='<span class="lock-badge bloqueado">&#x1F512; Palpites encerrados</span>';
  }

  // Centro do card
  var meio;
  if(enc){
    meio='<div style="text-align:center">'+
      '<div class="res-oficial">'+r.c+' x '+r.f+'</div>'+
      '<div style="font-size:11px;color:var(--texto3);margin-top:2px">Resultado oficial</div>'+
      (p.c!=null?'<div style="font-size:11px;color:var(--texto3);margin-top:1px">Seu palpite: '+p.c+' x '+p.f+'</div>':
        '<div style="font-size:11px;color:var(--vermelho);margin-top:1px;font-weight:600">Sem palpite — 0 pts</div>')+
      (p.c!=null&&ptsHtml?'<div style="margin-top:4px">'+ptsHtml+'</div>':'')+
      '</div>';
  } else if(editavel&&!locked){
    meio='<div style="text-align:center">'+
      '<div class="placar-area">'+
      '<input class="pinput'+(p.c!=null?' ok':'')+'" type="number" min="0" max="20" '+
        'value="'+(p.c!=null?p.c:'')+'" onchange="salvar('+id+',\'c\',this.value)">'+
      '<span class="psep">x</span>'+
      '<input class="pinput'+(p.f!=null?' ok':'')+'" type="number" min="0" max="20" '+
        'value="'+(p.f!=null?p.f:'')+'" onchange="salvar('+id+',\'f\',this.value)">'+
      '</div>'+
      '<div class="pts-hint">'+pr+'pts resultado / '+pe+'pts exato</div>'+
      '</div>';
  } else if(locked){
    // Bloqueado — mostra ultimo palpite salvo (read-only)
    meio='<div style="text-align:center">'+
      '<div class="placar-area">'+
      '<input class="pinput locked" type="number" value="'+(p.c!=null?p.c:'')+'" readonly>'+
      '<span class="psep">x</span>'+
      '<input class="pinput locked" type="number" value="'+(p.f!=null?p.f:'')+'" readonly>'+
      '</div>'+
      (p.c!=null?
        '<div class="pts-hint">Palpite salvo (encerrado)</div>':
        '<div class="pts-hint" style="color:var(--vermelho)">Sem palpite registrado</div>')+
      '</div>';
  } else {
    meio='<div style="text-align:center;font-size:13px;color:var(--texto3)">'+
      (p.c!=null?'<b style="color:var(--texto)">'+p.c+'-'+p.f+'</b>':'-')+
      '</div>';
  }

  // Icone/botao ver palpites — aparece para todos apos bloqueio
  var verBtn='';
  if(enc||locked){
    verBtn='<div style="margin-top:8px;display:flex;justify-content:center">'+
      '<button onclick="abrirModal('+id+',event)" style="'+
        'display:flex;align-items:center;gap:6px;padding:7px 16px;'+
        'background:var(--azul-light);border:1.5px solid #BFDBFE;'+
        'border-radius:20px;cursor:pointer;font-size:12px;font-weight:700;'+
        'color:var(--azul);transition:all .2s">'+
        '&#x1F465; Ver todos os palpites'+
      '</button>'+
    '</div>';
  } else if(st==='aberto'||st==='fechando'){
    // Ícone informativo — ainda nao disponível
    verBtn='<div style="margin-top:6px;text-align:center">'+
      '<span style="font-size:10px;color:var(--texto3);display:inline-flex;align-items:center;gap:4px">'+
        '&#x1F512; Palpites dos outros ficam visíveis após o prazo'+
      '</span>'+
    '</div>';
  }

  var cardClass='jcard'+(isBrasil?' brasil':'')+(enc?' enc':'')+
    (locked&&!enc?' bloqueado':'')+((enc||locked)?' clicavel':'')+
    (JOGOS_ANULADOS[id]?' anulado':'');

  return '<div class="'+cardClass+'">'+
    '<div class="jcard-top">'+
      '<span class="jcard-fase '+faseClass(fase)+'">'+fab+'</span>'+
      '<span class="jcard-meta">'+dataFmt+(isBrasil?' &#x1F1E7;&#x1F1F7;':'')+'</span>'+
    '</div>'+
    (JOGOS_ANULADOS[id]?
      '<div style="background:#FEE2E2;border:1px solid #FCA5A5;border-radius:8px;'+
        'padding:6px 12px;margin-bottom:8px;text-align:center;'+
        'font-size:12px;font-weight:700;color:#991B1B">'+
        'JOGO ANULADO — Todos recebem 0 pontos neste jogo'+
      '</div>':'')+
    '<div class="jcard-body">'+
      '<div class="tright"><div class="tname">'+casa+' '+flag(casa)+'</div></div>'+
      meio+
      '<div><div class="tname">'+flag(fora)+fora+'</div></div>'+
    '</div>'+
    (lockHtml?'<div class="lock-status" style="margin-top:8px">'+lockHtml+'</div>':'')+
    verBtn+
    '</div>';
}

// ── SALVAR PALPITE ────────────────────────────────────────────────────────────
// Sistema de salvamento robusto com fila e retry
var SAVING = {}; // {id: true} — evita chamadas simultâneas
var PENDING = {}; // {id: {c,f}} — palpite pendente enquanto salva

function salvar(id,lado,val){
  var j=JOGOS.find(function(x){return x[0]===id;});
  if(j){
    var st=statusJogo(j[1],id);
    if(st==='bloqueado'||st==='encerrado'){
      toast('Palpites encerrados!','err');
      return;
    }
  }
  if(!PALPS[id])PALPS[id]={};
  PALPS[id][lado]=val===''?null:parseInt(val);

  // Marca input visualmente
  var inp=document.getElementById('i'+id+(lado==='c'?'c':'f'));
  if(inp){inp.style.borderColor='#F59E0B';} // amarelo = aguardando

  clearTimeout(DTIMER[id]);
  DTIMER[id]=setTimeout(function(){persistir(id,0);},800);
}

async function persistir(id, tentativa){
  if(tentativa===undefined)tentativa=0;
  var p=PALPS[id];
  if(!p||p.c==null||p.f==null)return;

  // Se já está salvando este jogo, agenda para depois
  if(SAVING[id]){
    PENDING[id]={c:p.c,f:p.f};
    return;
  }
  SAVING[id]=true;

  var j=JOGOS.find(function(x){return x[0]===id;});
  if(j){
    var st=statusJogo(j[1],id);
    if(st==='bloqueado'||st==='encerrado'){
      SAVING[id]=false;
      toast('Palpites encerrados!','err');
      return;
    }
  }

  try{
    // Estratégia: SELECT → UPDATE se existe, INSERT se não existe
    var {data: existe, error: eS} = await SB
      .from('palpites')
      .select('id')
      .eq('usuario', USER.nome)
      .eq('jogo_id', id)
      .maybeSingle();

    var erro = null;
    if(existe){
      // Registro existe — faz UPDATE pelo id primário
      var {error: eU} = await SB
        .from('palpites')
        .update({
          gol_casa: p.c,
          gol_fora: p.f,
          atualizado_em: new Date().toISOString()
        })
        .eq('id', existe.id);
      erro = eU;
      console.log('UPDATE jogo #'+id+' id='+existe.id, eU||'OK');
    } else {
      // Não existe — faz INSERT
      var {error: eI} = await SB
        .from('palpites')
        .insert({
          usuario: USER.nome,
          jogo_id: id,
          gol_casa: p.c,
          gol_fora: p.f,
          atualizado_em: new Date().toISOString()
        });
      erro = eI;
      console.log('INSERT jogo #'+id, eI||'OK');
    }

    if(erro){
      console.error('Erro jogo #'+id+':', erro);
      if(tentativa < 3){
        SAVING[id]=false;
        setTimeout(function(){persistir(id, tentativa+1);}, 1000);
        return;
      }
      toast('Erro #'+id+': '+erro.message,'err');
    } else {
      var ic=document.getElementById('i'+id+'c');
      var if2=document.getElementById('i'+id+'f');
      if(ic){ic.style.borderColor='#00A36C';ic.style.background='#E8F8F2';}
      if(if2){if2.style.borderColor='#00A36C';if2.style.background='#E8F8F2';}
      toast('Salvo! #'+id+' '+p.c+'x'+p.f,'ok');
    }
  } catch(e){
    console.error('Excecao #'+id+':', e);
    if(tentativa < 2){
      SAVING[id]=false;
      setTimeout(function(){persistir(id, tentativa+1);}, 1500);
      return;
    }
    toast('Erro: '+e.message,'err');
  }

  SAVING[id]=false;

  // Se tinha palpite pendente, salva agora
  if(PENDING[id]){
    var pend=PENDING[id];
    delete PENDING[id];
    PALPS[id]={c:pend.c,f:pend.f};
    setTimeout(function(){persistir(id,0);}, 300);
  }
}

// ── MODAL — PALPITES DE TODOS ─────────────────────────────────────────────────
async function abrirModal(jogoId, event){
  if(event)event.stopPropagation();
  var j=JOGOS.find(function(x){return x[0]===jogoId;});
  if(!j)return;

  document.getElementById('modal-overlay').classList.add('show');
  document.getElementById('modal-title').textContent='#'+jogoId+' '+flag(j[5])+j[5]+' x '+flag(j[6])+j[6];
  document.getElementById('modal-lista').innerHTML=
    '<div style="text-align:center;padding:30px;color:var(--texto3)"><span class="spin"></span> Carregando...</div>';

  var r=RESULS[jogoId];
  var infoHtml='';
  if(r){
    infoHtml='<div class="modal-placar">'+r.c+' x '+r.f+'</div>'+
      '<div class="modal-sub">Resultado oficial &bull; '+fmtData(j[1])+'</div>';
  } else {
    infoHtml='<div class="modal-placar" style="font-size:18px;color:var(--texto2)">&#x1F512; Aguardando resultado</div>'+
      '<div class="modal-sub">'+fmtData(j[1])+' &bull; '+j[4]+'</div>';
  }
  document.getElementById('modal-jogo-info').innerHTML=infoHtml;

  // Busca todos os palpites deste jogo + todos os usuarios
  var rPals=await dbFilter('palpites','jogo_id',jogoId);
  var rUsr=await SB.from('usuarios').select('nome').neq('nome','admin');
  var usuarios=rUsr.data||[];

  // Monta mapa palpite por usuario
  var palMap={};
  rPals.forEach(function(p){palMap[p.usuario]={c:p.gol_casa,f:p.gol_fora};});

  if(!usuarios.length){
    document.getElementById('modal-lista').innerHTML=
      '<div class="empty" style="padding:24px"><div class="empty-text">Nenhum participante ainda.</div></div>';
    return;
  }

  // Ordena: com palpite primeiro, depois por pontos desc
  var lista=usuarios.map(function(u){
    var pal=palMap[u.nome]||null;
    var pts=0;
    if(pal&&r)pts=calcPts(j[2],pal.c,pal.f,r.c,r.f,j[0]);
    return{nome:u.nome,pal:pal,pts:pts};
  });

  // Ordena: sem palpite vai pro final, depois por resultado (col1 vence, empate, col2 vence)
  // dentro de cada grupo: por placar crescente (casa asc, fora asc), depois alfabético
  lista.sort(function(a,b){
    // Sem palpite vai pro final
    if(!a.pal && !b.pal) return a.nome.localeCompare(b.nome,'pt');
    if(!a.pal) return 1;
    if(!b.pal) return -1;
    // Grupo por resultado: col1 vence (c>f), empate (c==f), col2 vence (c<f)
    var ga = a.pal.c > a.pal.f ? 0 : a.pal.c === a.pal.f ? 1 : 2;
    var gb = b.pal.c > b.pal.f ? 0 : b.pal.c === b.pal.f ? 1 : 2;
    if(ga !== gb) return ga - gb;
    // Dentro do grupo: placar crescente (menor gols casa primeiro, depois fora)
    if(a.pal.c !== b.pal.c) return a.pal.c - b.pal.c;
    if(a.pal.f !== b.pal.f) return a.pal.f - b.pal.f;
    // Empate no placar: ordem alfabética
    return a.nome.localeCompare(b.nome,'pt');
  });

  // Abreviação dos times para o cabeçalho
  var abbr = function(nome){ return nome.substring(0,3).toUpperCase(); };
  var nc=getNomeExibicao(j[0],'casa',j[5]);
  var nf=getNomeExibicao(j[0],'fora',j[6]);
  var cabecalho =
    '<div style="display:flex;align-items:center;gap:12px;padding:8px 0 10px;'+
      'border-bottom:1.5px solid var(--borda);margin-bottom:4px">'+
      '<div style="flex:1;font-size:11px;font-weight:700;color:var(--texto3);text-transform:uppercase;letter-spacing:1px">Participante</div>'+
      '<div style="min-width:80px;text-align:center;font-size:11px;font-weight:700;'+
        'color:var(--azul);background:var(--azul-light);border-radius:8px;padding:3px 8px">'+
        abbr(nc)+' x '+abbr(nf)+
      '</div>'+
      '<div style="min-width:80px;text-align:center;font-size:11px;font-weight:700;color:var(--texto3)">Pontos</div>'+
    '</div>';

  // Separadores de grupo
  var grupoAtual = -1;
  var grupoLabels = [abbr(nc)+' vence', 'Empate', abbr(nf)+' vence', '— Sem palpite'];

  var html = cabecalho + lista.map(function(u,idx){
    var isMe=u.nome===USER.nome;
    var palHtml,ptsCls,ptsHtml;

    // Separador de grupo
    var grupoPal = !u.pal ? 3 : u.pal.c > u.pal.f ? 0 : u.pal.c === u.pal.f ? 1 : 2;
    var separador = '';
    if(grupoPal !== grupoAtual){
      grupoAtual = grupoPal;
      separador = '<div style="font-size:10px;font-weight:700;color:var(--texto3);'+
        'text-transform:uppercase;letter-spacing:1px;padding:10px 0 4px;'+
        'border-top:'+(idx>0?'1px solid var(--cinza3)':'none')+'">'+
        grupoLabels[grupoPal]+'</div>';
    }

    if(u.pal){
      palHtml='<div class="pr-palpite">'+u.pal.c+' x '+u.pal.f+'</div>';
      if(JOGOS_ANULADOS[jogoId]){
        ptsHtml='<span class="pr-pts" style="background:#FEE2E2;color:#991B1B">0 pts</span>';
      } else if(r){
        var pts=calcPts(j[2],u.pal.c,u.pal.f,r.c,r.f,jogoId);
        var pe=PTS[j[2]]?PTS[j[2]][1]:0,pr2=PTS[j[2]]?PTS[j[2]][0]:0;
        if(pts===pe)ptsHtml='<span class="pr-pts exato">+'+pts+' Exato!</span>';
        else if(pts===pr2)ptsHtml='<span class="pr-pts result">+'+pts+' Resultado</span>';
        else ptsHtml='<span class="pr-pts errou">0 pts</span>';
      } else {
        ptsHtml='<span class="pr-pts pend">Aguardando</span>';
      }
    } else {
      palHtml='<div class="sem-palpite" style="color:var(--vermelho);font-weight:600">Sem palpite</div>';
      ptsHtml='<span class="pr-pts errou">0 pts</span>';
    }
    return '<div class="palpite-row" style="'+(isMe?'background:var(--verde-light);border-radius:8px;padding:10px 8px;':'')+'">'+
      '<div class="pr-avatar">'+u.nome[0].toUpperCase()+'</div>'+
      '<div class="pr-nome">'+u.nome+(isMe?' <span style="font-size:10px;color:var(--verde);font-weight:700">(voce)</span>':'')+'</div>'+
      palHtml+
      ptsHtml+
      '</div>';
  }).join('');

  document.getElementById('modal-lista').innerHTML=html;
}

async function renderRanking(){
  document.getElementById('div-ranking').innerHTML=
    '<div style="text-align:center;padding:40px;color:var(--texto3)"><span class="spin"></span> Calculando...</div>';
  var rRes=await dbAll('resultados');
  var rPals=await dbAll('palpites');
  var rUsr=await SB.from('usuarios').select('nome').neq('nome','admin');
  RESULS={};rRes.forEach(function(r){RESULS[parseInt(r.jogo_id)]={c:parseInt(r.gol_casa),f:parseInt(r.gol_fora)};});
  var usuarios=rUsr.data||[];
  if(!usuarios.length){
    document.getElementById('div-ranking').innerHTML=
      '<div class="empty"><div class="empty-icon">&#x1F465;</div><div class="empty-text">Nenhum participante ainda.</div></div>';
    return;
  }
  var palMap={};
  // Ordena por id para garantir que o mais recente (maior id) prevaleça
  rPals.sort(function(a,b){return a.id-b.id;});
  rPals.forEach(function(p){
    if(!palMap[p.usuario])palMap[p.usuario]={};
    var gc=parseInt(p.gol_casa), gf=parseInt(p.gol_fora);
    // Só atualiza se tiver valores explicitamente não-nulos e não-NaN
    if(p.gol_casa!=null && p.gol_fora!=null && !isNaN(gc) && !isNaN(gf)){
      palMap[p.usuario][parseInt(p.jogo_id)]={c:gc,f:gf};
    }
  });
  var rank=usuarios.map(function(u){
    var pals=palMap[u.nome]||{};
    var total=0,acertos=0,exatos=0;
    JOGOS.forEach(function(j){
      var p=pals[j[0]],r=RESULS[j[0]];if(!p||!r)return;
      var pts=calcPts(j[2],p.c,p.f,r.c,r.f,j[0]);
      if(pts>0){total+=pts;acertos++;if(pts===PTS[j[2]][1])exatos++;}
    });
    return{nome:u.nome,total:total,acertos:acertos,exatos:exatos,np:Object.keys(pals).length};
  });
  rank.sort(function(a,b){return b.total-a.total||b.exatos-a.exatos||b.acertos-a.acertos||a.nome.localeCompare(b.nome,'pt');});
  var mx=rank[0]?rank[0].total:1;
  // Calcula posição real considerando empates
  var posicoes=[];
  var posAtual=1;
  for(var ri=0;ri<rank.length;ri++){
    if(ri>0 &&
      rank[ri].total===rank[ri-1].total &&
      rank[ri].exatos===rank[ri-1].exatos &&
      rank[ri].acertos===rank[ri-1].acertos){
      posicoes.push(posicoes[ri-1]); // mesma posição
    } else {
      posAtual = ri+1;
      posicoes.push(posAtual);
    }
  }
  document.getElementById('div-ranking').innerHTML=rank.map(function(u,i){
    var pos=posicoes[i];
    var medal = pos + '';
    var pc = pos <= 5 ? 'rp' + pos : 'rpn';
    var isme=u.nome===USER.nome;
    var pct=mx>0?u.total/mx*100:0;
    return '<div class="rank-item'+(isme?' me':'')+'">'+
      '<div class="rank-pos '+pc+'">'+medal+'</div>'+
      '<div class="rank-info">'+
        '<div class="rank-nome">'+u.nome+(isme?' <span style="font-size:10px;color:var(--verde)">(voce)</span>':'')+'</div>'+
        '<div class="mbar"><div class="mbar-fill" style="width:'+pct+'%"></div></div>'+
        '<div class="rank-sub">'+u.acertos+' acertos &bull; '+u.exatos+' exatos &bull; '+u.np+' palpites</div>'+
      '</div>'+
      '<div style="text-align:center">'+
        '<div class="rank-pts">'+u.total+'</div>'+
        '<div class="rank-pts-label">pts</div>'+
      '</div>'+
      '</div>';
  }).join('');
}

// Cache local dos times editados (carregado do Supabase)
var TIMES_JOGOS = {}; // {jogoId: {casa: 'Brasil', fora: 'Argentina'}}

async function carregarTimesJogos() {
  var rows = await dbAll('times_jogos');
  TIMES_JOGOS = {};
  rows.forEach(function(r){
    TIMES_JOGOS[r.jogo_id] = {casa: r.time_casa, fora: r.time_fora};
  });
}

function getNomeExibicao(jogoId, lado, nomePadrao) {
  var t = TIMES_JOGOS[jogoId];
  if(t && t[lado]) return t[lado];
  return nomePadrao;
}

async function salvarTimesDB(jogoId, nomeCasa, nomeFora) {
  var err = await dbUpsert('times_jogos', {
    jogo_id: jogoId,
    time_casa: nomeCasa,
    time_fora: nomeFora,
    atualizado_em: new Date().toISOString()
  }, 'jogo_id');
  if(err) { toast('Erro ao salvar: '+err.message, 'err'); return false; }
  TIMES_JOGOS[jogoId] = {casa: nomeCasa, fora: nomeFora};
  return true;
}

  var iUsr=usuarios.map(function(u){

    '</div>'+
    '<div class="acard" style="margin-bottom:12px">'+

      '<div style="font-size:11px;color:var(--texto3);margin-bottom:12px;line-height:1.6">'+
        'Selecione os times classificados para cada confronto eliminatorio. '+

      '</div>'+
      iELIM+
    '</div>'+
    '<div class="acard"><h3>Resultados Inseridos ('+comRes.length+')</h3>'+

          JOGOS.filter(function(j){return !RESULS[j[0]];}).slice(0,50)
            .map(function(j){
              var nc=getNomeExibicao(j[0],"casa",j[5]);
              var nf=getNomeExibicao(j[0],"fora",j[6]);

              return "<option value="+j[0]+">#"+j[0]+" "+nc+" x "+nf+" - "+fmtData(dtAtual)+alt+"</option>";

        }).join(", ")+"</div>"
        :"")+

      '<h3>&#x1F513; Reabrir Palpites de Jogo</h3>'+

          JOGOS.slice(0,72).map(function(j){
            var nc=getNomeExibicao(j[0],"casa",j[5]);
            var nf=getNomeExibicao(j[0],"fora",j[6]);
            var reab=JOGOS_REABERTOS[j[0]]?" (ABERTO)":"";
            return "<option value="+j[0]+">#"+j[0]+" "+nc+" x "+nf+" "+fmtData(j[1])+reab+"</option>";
          }).join("")+

async function salvarTimes(id){
  var vc = document.getElementById('sc'+id+'c');
  var vf = document.getElementById('sc'+id+'f');
  if(!vc||!vf)return;
  var nc = vc.value, nf = vf.value;
  if(!nc||!nf){toast('Selecione os dois times!','err');return;}
  var btn = document.querySelector('[onclick="salvarTimes('+id+')"]');
  if(btn){btn.disabled=true;btn.textContent='...';}
  var ok = await salvarTimesDB(id, nc, nf);
  if(ok){
    toast(flag(nc)+nc+' x '+flag(nf)+nf+' salvo!','ok');
    if(btn){btn.disabled=false;btn.innerHTML='&#x2713; Salvo';btn.classList.add('salvo');}
  } else {
    if(btn){btn.disabled=false;btn.innerHTML='&#x1F4BE; Salvar';}
  }
}

function anularJogo(){
  var sel=document.getElementById('sel-anular');
  if(!sel||!sel.value){toast('Selecione o jogo!','err');return;}
  var id=parseInt(sel.value);
  var j=JOGOS.find(function(x){return x[0]===id;});
  var nome=j?j[5]+' x '+j[6]:'#'+id;
  if(!confirm('Anular jogo #'+id+' '+nome+'?\nTodos receberão 0 pts neste jogo.'))return;
  JOGOS_ANULADOS[id]=true;
  toast('Jogo #'+id+' anulado — 0 pts para todos!','ok');
  renderAdmin();
}
function restaurarJogo(){
  var sel=document.getElementById('sel-anular');
  if(!sel||!sel.value){toast('Selecione o jogo!','err');return;}
  var id=parseInt(sel.value);
  delete JOGOS_ANULADOS[id];
  toast('Jogo #'+id+' restaurado — pontos normais!','ok');
  renderAdmin();
}
function alterarDataJogo(){
  var sel = document.getElementById('sel-altdt');
  var dt  = document.getElementById('inp-dt').value;
  var hr  = document.getElementById('inp-hr').value;
  if(!sel||!sel.value||!dt||!hr){toast('Selecione o jogo, data e hora!','err');return;}
  var id = parseInt(sel.value);
  JOGOS_HORARIO[id] = dt+'T'+hr;
  toast('Jogo #'+id+' alterado para '+dt.slice(5)+' '+hr+' BRT','ok');
  renderAdmin();
}
function restaurarDataJogo(){
  var sel = document.getElementById('sel-altdt');
  if(!sel||!sel.value){toast('Selecione o jogo!','err');return;}
  var id = parseInt(sel.value);
  delete JOGOS_HORARIO[id];
  toast('Jogo #'+id+' restaurado ao horario original','ok');
  renderAdmin();
}
function reabrirJogo(){
  var sel = document.getElementById('sel-reabrir');
  if(!sel||!sel.value)return;
  var id = parseInt(sel.value);
  var j = JOGOS.find(function(x){return x[0]===id;});
  if(!j)return;
  JOGOS_REABERTOS[id] = true;
  toast('Jogo #'+id+' reaberto para palpites!','ok');
  renderAdmin();
  renderPalpites();
}
function fecharJogo(){
  var sel = document.getElementById('sel-reabrir');
  if(!sel||!sel.value)return;
  var id = parseInt(sel.value);
  delete JOGOS_REABERTOS[id];
  toast('Jogo #'+id+' bloqueado novamente!','ok');
  renderAdmin();
  renderPalpites();
}

async function salvarRes(id){
  var vc=document.getElementById('a'+id+'c').value;
  var vf=document.getElementById('a'+id+'f').value;
  if(vc===''||vf===''){toast('Preencha os dois placares!','err');return;}
  var btn=document.getElementById('bsv'+id);
  btn.disabled=true;btn.textContent='...';
  var r2=await adminOp('upsert_resultado',id,parseInt(vc),parseInt(vf));
  var err=r2.error;
  if(err){toast('Erro: '+err.message,'err');btn.disabled=false;btn.textContent='Salvar';}
  else{RESULS[id]={c:parseInt(vc),f:parseInt(vf)};toast('Jogo #'+id+' salvo!','ok');setTimeout(renderAdmin,500);}
}

function editarRes(id){
  document.getElementById('res-view'+id).style.display='none';
  document.getElementById('res-edit'+id).style.display='flex';
}
function cancelarEditRes(id){
  document.getElementById('res-view'+id).style.display='flex';
  document.getElementById('res-edit'+id).style.display='none';
}
async function confirmarEditRes(id){
  var vc=document.getElementById('ec'+id).value;
  var vf=document.getElementById('ef'+id).value;
  if(vc===''||vf===''){toast('Preencha os dois placares!','err');return;}
  var r2=await adminOp('upsert_resultado',id,parseInt(vc),parseInt(vf));
  var err=r2.error;
  if(err){toast('Erro: '+err.message,'err');return;}
  RESULS[id]={c:parseInt(vc),f:parseInt(vf)};
  toast('Placar corrigido! '+vc+' x '+vf,'ok');
  setTimeout(renderAdmin,400);
}

async function excluirRes(id){
  var j=JOGOS.find(function(x){return x[0]===id;});
  if(!confirm('Excluir resultado: '+(j?j[5]+' x '+j[6]:'#'+id)+'?'))return;
  var rdel=await adminOp('delete_resultado',id);
  var err=rdel.error;
  if(err)toast('Erro: '+err.message,'err');
  else{delete RESULS[id];toast('Resultado excluido!','ok');setTimeout(renderAdmin,400);}
}

// ── UTILS ─────────────────────────────────────────────────────────────────────
function loading(m){document.getElementById('loading').style.display='flex';document.getElementById('lmsg').textContent=m||'';}
function noloading(){document.getElementById('loading').style.display='none';}
function toast(msg,tipo){
  var t=document.getElementById('toast');
  t.textContent=msg;t.className='show '+(tipo||'');
  clearTimeout(TTIMER);
  TTIMER=setTimeout(function(){t.className='';},2600);
}

document.addEventListener('DOMContentLoaded', async function(){
  document.getElementById('e-senha').addEventListener('keydown',function(e){if(e.key==='Enter')entrar();});
  document.getElementById('c-s2').addEventListener('keydown',function(e){if(e.key==='Enter')cadastrar();});

  // Verifica sessao Auth ativa (admin)
  var authSession = await SB.auth.getSession();
  if(authSession.data && authSession.data.session){
    var sess = authSession.data.session;
    if(sess.user && sess.user.email === 'silvaveterinario@gmail.com'){
      USER = {nome:'admin', admin:true};
      localStorage.setItem('bolao_user', JSON.stringify(USER));
      document.getElementById('tela-login').style.display='none';
      document.getElementById('app').style.display='block';
      document.getElementById('unome').textContent='admin';
      document.getElementById('uavatar').textContent='A';
      document.getElementById('bn-admin').style.display='flex';
      await carregarDados();
      await renderInicio();
      return;
    }
  }

  // Tenta login automático se houver sessão salva (participantes)
  var sessao = localStorage.getItem('bolao_user');
  if(sessao){
    try{
      var u = JSON.parse(sessao);
      if(u && u.nome && u.nome !== 'admin'){
        // Verifica se o usuário ainda existe no banco
        loading('Entrando automaticamente...');
        var res = await dbSingle('usuarios','nome',u.nome);
        noloading();
        if(res.data){
          USER = {nome: res.data.nome, admin: res.data.admin||false};
          if(u.nome==='admin') USER = {nome:'admin', admin:true};
          document.getElementById('tela-login').style.display='none';
          document.getElementById('app').style.display='block';
          document.getElementById('unome').textContent=USER.nome;
          document.getElementById('uavatar').textContent=USER.nome[0].toUpperCase();
          if(USER.admin) document.getElementById('bn-admin').style.display='flex';
          await carregarDados();
          await renderInicio();
        } else {
          // Usuário não existe mais — limpa sessão
          localStorage.removeItem('bolao_user');
          noloading();
        }
      }
    } catch(e){
      console.error('Erro auto-login:', e);
      localStorage.removeItem('bolao_user');
      noloading();
    }
  }
});
</script>
